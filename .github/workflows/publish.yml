name: Publish

# Publishes on every pushed tag like v1.0.1
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # manual run publishes ONLY to GitHub Packages

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # RubyGems OIDC trusted publishing
  packages: write   # GitHub Packages

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Test
        run: bundle exec rspec

      - name: Build gem
        run: gem build bayarcash.gemspec

      # ---- 1) Publish to RubyGems.org (OIDC trusted publishing, no token) ----
      - name: Publish to RubyGems
        if: github.event_name == 'push'
        uses: rubygems/release-gem@v1

      # ---- 2) Publish to GitHub Packages ----
      - name: Publish to GitHub Packages
        run: gem push --host "https://rubygems.pkg.github.com/bayarcash" bayarcash-*.gem
        env:
          GEM_HOST_API_KEY: "Bearer ${{ secrets.GITHUB_TOKEN }}"

      # ---- 3) Create a GitHub Release for the tag ----
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
